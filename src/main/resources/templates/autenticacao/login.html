<!DOCTYPE html>
<html lang="pt-Br" xmlns:th="http://thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{template.html}">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" th:href="@{/web/css/components.css}">

</head>

<body>
    <div layout:fragment="conteudo">
        <main class="container">
            <section class="card form-card">
                <h2 class="title">Login</h2>

                <form method="post" action="#" th:action="@{/web/login}">
                    <div class="alert alert-danger text-center text-uppercase" th:if="${param.error}">
                        <p>
                            <strong>Credenciais inválidas</strong>
                        </p>
                    </div>

                    <div class="alert alert-danger text-center text-uppercase" th:if="${param.logout != null}">
                        <p>
                            <strong>Você saiu da aplicação!</strong>
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="username" class="required">Email:</label>
                        <input id="username" name="username" type="email" class="form-control" required="required">
                    </div>

                    <div class="form-group">
                        <label for="password" class="required">Senha:</label>
                        <input id="password" name="password" type="password" class="form-control" required="required">
                    </div>

                    <button class="btn btn-primary" title="Entrar">
                        Entrar
                    </button>
                </form>
            </section>
        </main>
    </div>
</body>

<script th:src="@{/web/js/login.js}"></script>

</html>
