<header class="header" xmlns:th="http://thymeleaf.org" th:fragment="menu"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container header-container">
        <a th:href="@{/web/}" class="logo">
            <img th:src="@{/web/assets/logo.png}" alt="Logo Voll">
        </a>

        <nav class="main-nav">
            <ul class="nav-left" sec:authorize="isAuthenticated()">
                <li class="dropdown">
                    <a href="#">
                        CADASTROS <i class="arrow-down"></i>
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a th:href="@{/web/medicos}">Médicos</a>
                        </li>

                        <li>
                            <a th:href="@{/web/pacientes}">Pacientes</a>
                        </li>

                        <li>
                            <a th:href="@{/web/consultas}">Consultas</a>
                        </li>
                    </ul>
                </li>
            </ul>
            <ul class="nav-right" sec:authorize="isAuthenticated()">
                <li class="dropdown">
                    <a href="#">
                        Olá, <span sec:authentication="principal.username"></span> <i class="arrow-down"></i>
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a th:href="@{/web/login/logout}">Sair</a>
                        </li>
                    </ul>
                </li>
            </ul>
            <div class="navbar-form" sec:authorize="!isAuthenticated()">
                <a class="btn-link" href="#" th:href="@{/web/login}">Login</a>
            </div>
        </nav>
    </div>
</header>
